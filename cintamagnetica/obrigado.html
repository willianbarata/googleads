<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Confirmado! - Compra Esperta</title>
    
    <!-- Meta Robots para evitar indexação redundante de conversão -->
    <meta name="robots" content="noindex, nofollow">

    <!-- CSS Compartilhado (Caminho relativo a subdiretório) -->
    <link rel="stylesheet" href="../assets/css/landing.css">

    <!-- Google tag (gtag.js) - Apenas tag global para remarketing (evita duplicidade de conversão) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18328327074"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'AW-18328327074');
    </script>
</head>
<body>

    <!-- Faixa Superior de Confirmação -->
    <div class="top-urgency-bar" style="background: linear-gradient(90deg, #2ed573, #26af5f);">
        <span>🎉 SEU PEDIDO DE MASSAGEADOR EMS FOI CONFIRMADO!</span>
    </div>

    <div class="container">
        <div class="thankyou-wrapper" style="min-height: 50vh;">
            <!-- Ícone de Sucesso (Checkmark SVG) -->
            <div class="thankyou-icon">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>

            <!-- Título e Texto principal -->
            <h1 class="thankyou-title">Tudo Pronto!</h1>
            <p class="thankyou-text" style="max-width: 500px; margin-bottom: 20px;">
                Obrigado pela sua compra. Seu pedido do <strong>Massageador Corporal EMS</strong> foi registrado no nosso sistema e já está sendo preparado pela logística da <strong>Compra Esperta</strong>.
            </p>
        </div>
    </div>

    <!-- Rodapé Simplificado -->
    <footer class="landing-footer" style="background-color: var(--bg-white);">
        <p>Instagram: @compraesperta.promocoes</p>
    </footer>

</body>
</html>
