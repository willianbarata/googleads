server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html index.htm;

    # Habilita compressão Gzip para arquivos texto/código (melhora velocidade de carregamento)
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    location / {
        # Busca o arquivo exato, depois a pasta (/pasta/ -> index.html) e depois o arquivo com extensão .html
        try_files $uri $uri/ $uri.html =404;
    }

    # Controle de Cache para assets de mídia e estilos
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 404 /404.html;
}
